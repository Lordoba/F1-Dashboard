<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Season</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="F1_Dashboard_Logo.png">
</head>

<body>

    <h1 id="season-title">Season</h1>

    <a href="index.html">← Zurück zur Übersicht</a> <!--Dammit man zurück zur hauptseite kann -->

    <h2>Driver Standings</h2>
    <div id="driver-standings"></div>
    <table id="driverTable">
      <thead>
        <tr>
            <th>Position</th>
            <th>Fahrer</th>
            <th id="driverWins">Siege</th> <!--ID für die Siege-Spalte, damit wir sie später mit JavaScript ansprechen können um zu sortieren -->
            <th id="driverPoints">Punkte</th> <!--ID für die Punkte-Spalte, damit wir sie später mit JavaScript ansprechen können um zu sortieren -->
        </tr>
      </thead>
    <tbody id="driverBody"></tbody>
    </table>

    <h2>Constructor Standings</h2>
    <div id="constructor-standings"></div>
    <table id="constructorTable">
      <thead>
        <tr>
            <th>Position</th>
            <th>Team</th>
            <th id="constructorWins">Siege</th> <!--ID damit später sortiert werden kann -->
            <th id="constructorPoints">Punkte</th> <!--ID dammit später sortiert werden kann -->
        </tr>
      </thead>
      <tbody id="constructorBody"></tbody>
    </table>

    <script src="season.js"></script>
</body>

</html>
